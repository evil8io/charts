{{- range $name, $overrides := .Values.deployments }}
{{- $cfg := include "idle.mergedConfig" (dict "root" $ "overrides" $overrides) | fromYaml }}
{{- if $cfg.serviceAccount.create }}
{{- $ctx := dict "root" $ "name" $name "cfg" $cfg }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "idle.serviceAccountName" $ctx }}
  labels:
    {{- include "idle.deploymentLabels" $ctx | nindent 4 }}
  {{- with $cfg.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
