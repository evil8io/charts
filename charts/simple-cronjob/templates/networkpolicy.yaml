---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: '{{ include "simple-cronjob.fullname" . }}'
  labels:
    {{- include "simple-cronjob.labels" . | nindent 4 }}
  annotations: {}
spec:
  podSelector:
    matchLabels:
      {{- include "simple-cronjob.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - {}
