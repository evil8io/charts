{{ if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: '{{ eq .Values.rbac.scope "cluster" | ternary "ClusterRoleBinding" "RoleBinding" }}'
metadata:
  name: '{{ include "simple-cronjob.fullname" . }}'
  labels:
    {{- include "simple-cronjob.labels" . | nindent 4 }}
  annotations: {}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: '{{ include "simple-cronjob.fullname" . }}'
    namespace: '{{ .Release.Namespace }}'
{{ end -}}
